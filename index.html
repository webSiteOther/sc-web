<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المركز العلمي - شاشة الترحيب</title>
    
    <!-- ربط خط عربي احترافي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           إعدادات عامة وألوان المشروع
           ========================================= */
        :root {
            --bg-gradient: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            --primary-color: #1a365d;
            --shadow-color: rgba(0, 0, 0, 0.15);
            --glow-color: rgba(26, 54, 93, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        /* =========================================
           1. تصميم وحركة عنوان الترحيب
           ========================================= */
        .welcome-container {
            text-align: center;
            margin-bottom: 60px;
            z-index: 10;
        }

        .welcome-title {
            font-size: 4.5rem;
            color: var(--primary-color);
            font-weight: 800;
            text-shadow: 0 10px 20px var(--glow-color);
            opacity: 0;
            transform: translateY(-40px) scale(0.95);
            animation: welcomeAnim 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes welcomeAnim {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* =========================================
           2. تصميم حاوية الصور (الحركة الدائرية المتصلة)
           ========================================= */
        .slider-wrapper {
            width: 100%;
            overflow: hidden;
            padding: 30px 0;
            position: relative;
        }

        /* تأثير التلاشي على الأطراف */
        .slider-wrapper::before,
        .slider-wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            width: 150px;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .slider-wrapper::before { left: 0; background: linear-gradient(to right, #e9ecef 0%, transparent 100%); }
        .slider-wrapper::after { right: 0; background: linear-gradient(to left, #f8f9fa 0%, transparent 100%); }

        .slider-track {
            display: flex;
            width: max-content;
        }

        /* المجموعات التي تتحرك */
        .slide-group {
            display: flex;
            gap: 30px;
            padding-right: 30px; /* مسافة بين المجموعة الأولى والثانية */
            /* سرعة الحركة - يمكنك تعديل الـ 60s حسب الرغبة */
            animation: scrollTrack 60s linear infinite;
        }

        /* إيقاف الحركة عند وقوف الماوس على أي صورة */
        .slider-track:hover .slide-group {
            animation-play-state: paused;
        }

        /* الحركة الجذريّة التي تضمن عدم الانقطاع */
        @keyframes scrollTrack {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); } 
        }

        /* =========================================
           3. تصميم وتأثيرات الصور
           ========================================= */
        .slide-group img {
            height: 300px;
            width: 420px;
            object-fit: cover;
            border: 6px solid #ffffff;
            border-radius: 16px;
            box-shadow: 0 8px 15px var(--shadow-color);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            cursor: pointer;
        }

        .slide-group img:hover {
            transform: scale(1.08);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
            z-index: 5;
            position: relative;
        }

        /* =========================================
           4. الشاشات المختلفة (Responsive)
           ========================================= */
        @media (max-width: 1200px) {
            .welcome-title { font-size: 3.5rem; }
            .slide-group img { height: 250px; width: 350px; }
        }
        @media (max-width: 768px) {
            .welcome-title { font-size: 2.5rem; }
            .slide-group img { height: 180px; width: 260px; border-width: 4px; }
            .slider-wrapper::before, .slider-wrapper::after { width: 50px; }
        }
        @media (max-width: 480px) {
            .welcome-title { font-size: 1.8rem; }
            .slide-group img { height: 140px; width: 200px; }
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1 class="welcome-title">أهلاً بيك في المركز العلمي</h1>
    </div>

    <!-- حاوية شريط الصور -->
    <div class="slider-wrapper" dir="ltr">
        <div class="slider-track" id="sliderTrack">
            <!-- المجموعة الأساسية من الصور -->
            <div class="slide-group" id="group1"></div>
            <!-- المجموعة المطابقة تماماً لضمان الحركة الدائرية المتصلة -->
            <div class="slide-group" id="group2"></div>
        </div>
    </div>

    <script>
        /* =========================================
           كود جلب الصور وتجهيز المجموعتين بشكل احترافي
           ========================================= */
        document.addEventListener("DOMContentLoaded", () => {
            const group1 = document.getElementById("group1");
            const group2 = document.getElementById("group2");
            const imageFolder = "images/";
            
            // سيبحث عن الصور من 1 حتى 150 لضمان شمول الفولدر بالكامل
            const maxImagesToCheck = 150; 
            let validImages = [];
            let imagesChecked = 0;

            // 1. فحص جميع الأرقام المحتملة في مجلد الصور
            for (let i = 1; i <= maxImagesToCheck; i++) {
                let img = new Image();
                img.src = `${imageFolder}img (${i}).jpeg`;
                
                // في حالة نجاح التحميل (الصورة موجودة)
                img.onload = () => {
                    validImages.push({ src: img.src, index: i });
                    imagesChecked++;
                    checkIfDone();
                };

                // في حالة فشل التحميل (الرقم غير موجود) نتخطاه بدون ترك فراغ
                img.onerror = () => {
                    imagesChecked++;
                    checkIfDone();
                };
            }

            // 2. هذه الدالة تتأكد أن الفحص اكتمل لجميع الصور قبل رسمها لضمان الترتيب المثالي
            function checkIfDone() {
                if (imagesChecked === maxImagesToCheck) {
                    
                    // ترتيب الصور تصاعدياً لتظهر بشكل منطقي
                    validImages.sort((a, b) => a.index - b.index);

                    // إضافة كل الصور الموجودة للمجموعة الأولى
                    validImages.forEach(item => {
                        const imgElement = document.createElement('img');
                        imgElement.src = item.src;
                        group1.appendChild(imgElement);
                    });

                    // استنساخ نفس الصور بنفس الترتيب للمجموعة الثانية للحركة المتصلة
                    validImages.forEach(item => {
                        const imgElement = document.createElement('img');
                        imgElement.src = item.src;
                        group2.appendChild(imgElement);
                    });
                }
            }
        });
    </script>

</body>
</html>
